<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LuxAura – Falciniai stogai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root {
      --black: #0a0a0a; --dark: #111214; --panel: #16181b;
      --border: rgba(255,255,255,0.08); --gold: #c9a84c;
      --gold-light: #e2c47a; --gold-dim: rgba(201,168,76,0.15);
      --white: #f5f2ec; --muted: #8a8880;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Outfit', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: var(--sans); font-weight: 300; line-height: 1.7; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.4; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.4rem 4rem; background: rgba(10,10,10,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); transition: padding 0.3s; }
    .nav-logo img { height: 52px; width: auto; display: block; mix-blend-mode: screen; }
    nav ul { list-style: none; display: flex; gap: 2.5rem; }
    nav ul a { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    nav ul a:hover { color: var(--gold); }
    .nav-cta { color: var(--black) !important; background: var(--gold); padding: 0.55rem 1.4rem; border-radius: 2px; font-weight: 500; transition: background 0.2s !important; }
    .nav-cta:hover { background: var(--gold-light) !important; }
    #hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 4rem; padding-top: 6rem; position: relative; overflow: hidden; }
    #hero::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 70% at 75% 50%, rgba(201,168,76,0.07) 0%, transparent 70%); pointer-events: none; }
    .hero-text { max-width: 560px; animation: fadeUp 1s ease both; }
    .hero-eyebrow { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.8rem; }
    .hero-eyebrow::before { content: ''; width: 2rem; height: 1px; background: var(--gold); }
    h1 { font-family: var(--serif); font-size: clamp(2.8rem, 5vw, 4.8rem); font-weight: 300; line-height: 1.1; margin-bottom: 1.8rem; }
    h1 em { font-style: italic; color: var(--gold); }
    .hero-sub { font-size: 1rem; color: var(--muted); max-width: 420px; margin-bottom: 2.8rem; line-height: 1.8; }
    .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary { display: inline-block; background: var(--gold); color: var(--black); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; padding: 0.9rem 2.2rem; text-decoration: none; border-radius: 2px; transition: background 0.2s, transform 0.2s; }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-outline { display: inline-block; border: 1px solid rgba(201,168,76,0.4); color: var(--gold); font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; padding: 0.9rem 2.2rem; text-decoration: none; border-radius: 2px; transition: border-color 0.2s, background 0.2s; }
    .btn-outline:hover { border-color: var(--gold); background: var(--gold-dim); }
    .hero-image-wrap { position: relative; height: 70vh; animation: fadeIn 1.2s ease both 0.3s; }
    .hero-image-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    .hero-img-placeholder { width: 100%; height: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .hero-badge { position: absolute; bottom: -1.5rem; left: -1.5rem; background: var(--gold); color: var(--black); padding: 1.2rem 1.6rem; border-radius: 4px; z-index: 2; }
    .hero-badge .num { font-family: var(--serif); font-size: 2rem; font-weight: 600; line-height: 1; display: block; }
    .hero-badge .label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 500; }
    .stats-bar { background: var(--panel); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; justify-content: center; }
    .stats-inner { display: grid; grid-template-columns: repeat(4, 1fr); max-width: 1100px; width: 100%; }
    .stat-item { padding: 2.5rem 2rem; border-right: 1px solid var(--border); text-align: center; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .stat-item:last-child { border-right: none; }
    .stat-item.visible { opacity: 1; transform: translateY(0); }
    .stat-num { font-family: var(--serif); font-size: 2.8rem; font-weight: 300; color: var(--gold); line-height: 1; margin-bottom: 0.3rem; }
    .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
    section { padding: 7rem 4rem; }
    .section-eyebrow { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem; }
    .section-eyebrow::before { content: ''; width: 1.5rem; height: 1px; background: var(--gold); }
    h2 { font-family: var(--serif); font-size: clamp(2rem, 3.5vw, 3.2rem); font-weight: 300; line-height: 1.15; margin-bottom: 1.2rem; }
    h2 em { font-style: italic; color: var(--gold); }
    #about-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
    .about-text p { color: var(--muted); margin-bottom: 1.2rem; font-size: 0.95rem; }
    .advantages-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .adv-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 1.6rem; position: relative; overflow: hidden; transition: border-color 0.3s, transform 0.3s; }
    .adv-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--gold); transform: scaleY(0); transform-origin: bottom; transition: transform 0.3s; }
    .adv-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-2px); }
    .adv-card:hover::before { transform: scaleY(1); }
    .adv-icon { font-size: 1.4rem; margin-bottom: 0.6rem; }
    .adv-title { font-size: 0.85rem; font-weight: 500; margin-bottom: 0.3rem; }
    .adv-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }
    #gallery-section { background: var(--panel); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .gallery-header { max-width: 1200px; margin: 0 auto 3rem; }
    .gallery-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 280px 280px; gap: 1rem; }
    .gallery-item { background: #1c1e22; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-item:first-child { grid-row: span 2; }
    .gallery-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.8rem; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
    #services-inner { max-width: 1200px; margin: 0 auto; }
    .services-header { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: end; margin-bottom: 4rem; }
    .services-intro { color: var(--muted); font-size: 0.95rem; line-height: 1.8; }
    .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .service-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 2.4rem 2rem; display: flex; gap: 1.5rem; align-items: flex-start; transition: border-color 0.3s; opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s; }
    .service-card.visible { opacity: 1; transform: translateY(0); }
    .service-card:hover { border-color: rgba(201,168,76,0.35); }
    .service-num { font-family: var(--serif); font-size: 2.2rem; font-weight: 300; color: rgba(201,168,76,0.25); line-height: 1; flex-shrink: 0; width: 2.5rem; }
    .service-content h3 { font-size: 1rem; font-weight: 500; margin-bottom: 0.5rem; }
    .service-content p { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
    #why-section { background: var(--panel); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .why-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
    .why-image-wrap { position: relative; height: 500px; }
    .why-image-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    .why-img-placeholder { width: 100%; height: 100%; background: #1c1e22; border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .why-list { list-style: none; display: flex; flex-direction: column; gap: 1.5rem; margin-top: 2rem; }
    .why-list li { display: flex; align-items: flex-start; gap: 1rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .why-list li:last-child { border-bottom: none; }
    .why-check { width: 24px; height: 24px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 0.1rem; color: var(--gold); font-size: 0.7rem; }
    .why-list h4 { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.2rem; }
    .why-list p { font-size: 0.8rem; color: var(--muted); }
    #contact-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: start; }
    .contact-intro { color: var(--muted); font-size: 0.95rem; line-height: 1.8; margin-bottom: 2.5rem; }
    .contact-details { display: flex; flex-direction: column; gap: 1.2rem; }
    .contact-item { display: flex; align-items: center; gap: 1rem; font-size: 0.88rem; color: var(--muted); }
    .contact-item-icon { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 0.9rem; flex-shrink: 0; }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .form-group input, .form-group textarea { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; padding: 0.8rem 1rem; color: var(--white); font-family: var(--sans); font-size: 0.88rem; outline: none; transition: border-color 0.2s; resize: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: rgba(201,168,76,0.5); }
    .form-group textarea { min-height: 110px; }
    .form-submit { background: var(--gold); color: var(--black); border: none; padding: 1rem 2.5rem; font-family: var(--sans); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; border-radius: 2px; transition: background 0.2s; align-self: flex-start; }
    .form-submit:hover { background: var(--gold-light); }
    footer { background: var(--panel); border-top: 1px solid var(--border); padding: 3rem 4rem; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo img { height: 52px; width: auto; mix-blend-mode: screen; }
    footer p { font-size: 0.75rem; color: var(--muted); }
    .footer-links { display: flex; gap: 2rem; }
    .footer-links a { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold); }
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @media (max-width: 900px) {
      nav { padding: 1.2rem 1.5rem; } nav ul { display: none; }
      #hero { grid-template-columns: 1fr; padding: 7rem 1.5rem 3rem; }
      .hero-image-wrap { height: 300px; margin-top: 2rem; }
      section { padding: 4rem 1.5rem; }
      #about-inner, .why-inner, #contact-inner { grid-template-columns: 1fr; gap: 3rem; }
      .services-header { grid-template-columns: 1fr; gap: 1rem; }
      .services-grid { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .gallery-item:first-child { grid-row: auto; }
      .stats-inner { grid-template-columns: repeat(2,1fr); }
      .advantages-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 1.5rem; text-align: center; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav id="nav">
  <div class="nav-logo">
    <img src="images/logo.png" alt="UAB LuxAura" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span style="display:none;font-family:var(--serif);font-size:1.6rem;font-weight:600;color:var(--gold);">LuxAura</span>
  </div>
  <ul>
    <li><a href="#about">Apie mus</a></li>
    <li><a href="#gallery-section">Darbai</a></li>
    <li><a href="#services">Paslaugos</a></li>
    <li><a href="#why-section">Kodėl mes</a></li>
    <li><a href="#contact" class="nav-cta">Susisiekti</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero" style="padding-top:0;padding-bottom:0;max-width:none;">
  <div class="hero-text">
    <div class="hero-eyebrow" id="hero-eyebrow"></div>
    <h1 id="hero-heading"></h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="btn-group">
      <a href="#contact" class="btn-primary" id="hero-btn1"></a>
      <a href="#services" class="btn-outline" id="hero-btn2"></a>
    </div>
  </div>
  <div class="hero-image-wrap">
    <div id="hero-img-container"></div>
    <div class="hero-badge">
      <span class="num">40+</span>
      <span class="label">metų tarnavimo laikas</span>
    </div>
  </div>
</section>

<!-- STATS -->
<div class="stats-bar">
  <div class="stats-inner" id="stats-inner"></div>
</div>

<!-- ABOUT -->
<section id="about">
  <div id="about-inner">
    <div class="about-text reveal">
      <div class="section-eyebrow" id="about-eyebrow"></div>
      <h2 id="about-heading"></h2>
      <p id="about-p1"></p>
      <p id="about-p2"></p>
    </div>
    <div class="advantages-grid reveal" id="advantages-grid"></div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery-section">
  <div class="gallery-header reveal">
    <div class="section-eyebrow" id="gallery-eyebrow"></div>
    <h2 id="gallery-heading"></h2>
  </div>
  <div class="gallery-grid reveal" id="gallery-grid"></div>
</section>

<!-- SERVICES -->
<section id="services">
  <div id="services-inner">
    <div class="services-header">
      <div class="reveal">
        <div class="section-eyebrow" id="services-eyebrow"></div>
        <h2 id="services-heading"></h2>
      </div>
      <p class="services-intro reveal" id="services-intro"></p>
    </div>
    <div class="services-grid" id="services-grid"></div>
  </div>
</section>

<!-- WHY US -->
<section id="why-section">
  <div class="why-inner">
    <div class="why-image-wrap reveal" id="why-img-container"></div>
    <div class="reveal">
      <div class="section-eyebrow" id="why-eyebrow"></div>
      <h2 id="why-heading"></h2>
      <p style="color:var(--muted);font-size:0.95rem;margin-bottom:0.5rem;" id="why-intro"></p>
      <ul class="why-list" id="why-list"></ul>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div id="contact-inner">
    <div class="reveal">
      <div class="section-eyebrow" id="contact-eyebrow"></div>
      <h2 id="contact-heading"></h2>
      <p class="contact-intro" id="contact-intro"></p>
      <div class="contact-details" id="contact-details"></div>
    </div>
    <div class="contact-form reveal">
      <div class="form-row">
        <div class="form-group"><label>Vardas</label><input type="text" placeholder="Jūsų vardas"></div>
        <div class="form-group"><label>Telefonas</label><input type="tel" placeholder="+370"></div>
      </div>
      <div class="form-group"><label>El. paštas</label><input type="email" placeholder="jusu@pastas.lt"></div>
      <div class="form-group"><label>Žinutė</label><textarea placeholder="Papasakokite apie savo projektą..."></textarea></div>
      <button class="form-submit">Siųsti užklausą</button>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div>
    <div class="footer-logo">
      <img src="images/logo.png" alt="UAB LuxAura" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span style="display:none;font-family:var(--serif);font-size:1.4rem;font-weight:600;color:var(--gold);">LuxAura</span>
    </div>
    <p style="margin-top:0.5rem;" id="footer-tagline"></p>
  </div>
  <div class="footer-links">
    <a href="#about">Apie mus</a>
    <a href="#services">Paslaugos</a>
    <a href="#gallery-section">Darbai</a>
    <a href="#contact">Kontaktai</a>
  </div>
  <p id="footer-copyright"></p>
</footer>

<script>
// ── LOAD DATA FROM JSON FILES ──
async function loadJSON(path) {
  try {
    const r = await fetch(path + '?v=' + Date.now());
    return await r.json();
  } catch(e) {
    console.warn('Could not load', path);
    return null;
  }
}

function photoIcon() {
  return `<div class="gallery-placeholder"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3"/><path d="M8 6V5a1 1 0 011-1h6a1 1 0 011 1v1"/></svg><span>Nuotrauka</span></div>`;
}

async function init() {
  const [hero, stats, about, gallery, services, whyus, contact, footer] = await Promise.all([
    loadJSON('data/hero.json'),
    loadJSON('data/stats.json'),
    loadJSON('data/about.json'),
    loadJSON('data/gallery.json'),
    loadJSON('data/services.json'),
    loadJSON('data/whyus.json'),
    loadJSON('data/contact.json'),
    loadJSON('data/footer.json'),
  ]);

  // HERO
  if (hero) {
    document.getElementById('hero-eyebrow').textContent = hero.eyebrow || '';
    document.getElementById('hero-heading').innerHTML =
      `${hero.heading1 || ''}<br><em>${hero.heading2 || ''}</em><br>${hero.heading3 || ''}`;
    document.getElementById('hero-sub').textContent = hero.sub || '';
    document.getElementById('hero-btn1').textContent = hero.btn1Text || 'Gauti pasiūlymą';
    document.getElementById('hero-btn2').textContent = hero.btn2Text || 'Mūsų paslaugos';
    const heroImgC = document.getElementById('hero-img-container');
    if (hero.image) {
      heroImgC.innerHTML = `<img src="${hero.image}" alt="LuxAura falcinis stogas" style="width:100%;height:100%;object-fit:cover;border-radius:4px;">`;
    } else {
      heroImgC.innerHTML = `<div class="hero-img-placeholder">${photoIcon()}<span>Pagrindinis vaizdas</span></div>`;
      heroImgC.style.height = '100%';
    }
  }

  // STATS
  if (stats && stats.items) {
    document.getElementById('stats-inner').innerHTML = stats.items.map(s =>
      `<div class="stat-item"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`
    ).join('');
  }

  // ABOUT
  if (about) {
    document.getElementById('about-eyebrow').textContent = about.eyebrow || '';
    document.getElementById('about-heading').innerHTML = about.heading || '';
    document.getElementById('about-p1').textContent = about.p1 || '';
    document.getElementById('about-p2').textContent = about.p2 || '';
    if (about.advantages) {
      document.getElementById('advantages-grid').innerHTML = about.advantages.map(a =>
        `<div class="adv-card"><div class="adv-icon">${a.icon}</div><div class="adv-title">${a.title}</div><div class="adv-desc">${a.desc}</div></div>`
      ).join('');
    }
  }

  // GALLERY
  if (gallery) {
    document.getElementById('gallery-eyebrow').textContent = gallery.eyebrow || '';
    document.getElementById('gallery-heading').innerHTML = gallery.heading || '';
    const grid = document.getElementById('gallery-grid');
    if (gallery.photos && gallery.photos.length > 0) {
      grid.innerHTML = gallery.photos.map(p =>
        `<div class="gallery-item"><img src="${p.image}" alt="${p.alt || ''}"></div>`
      ).join('');
    } else {
      grid.innerHTML = Array(5).fill(0).map((_, i) =>
        `<div class="gallery-item">${photoIcon()}</div>`
      ).join('');
    }
  }

  // SERVICES
  if (services) {
    document.getElementById('services-eyebrow').textContent = services.eyebrow || '';
    document.getElementById('services-heading').innerHTML = services.heading || '';
    document.getElementById('services-intro').textContent = services.intro || '';
    if (services.items) {
      document.getElementById('services-grid').innerHTML = services.items.map((s, i) =>
        `<div class="service-card"><div class="service-num">0${i+1}</div><div class="service-content"><h3>${s.title}</h3><p>${s.desc}</p></div></div>`
      ).join('');
    }
  }

  // WHY US
  if (whyus) {
    document.getElementById('why-eyebrow').textContent = whyus.eyebrow || '';
    document.getElementById('why-heading').innerHTML = whyus.heading || '';
    document.getElementById('why-intro').textContent = whyus.intro || '';
    const whyImgC = document.getElementById('why-img-container');
    if (whyus.image) {
      whyImgC.innerHTML = `<img src="${whyus.image}" alt="LuxAura komanda">`;
    } else {
      whyImgC.innerHTML = `<div class="why-img-placeholder">${photoIcon()}<span>Komandos / darbo nuotrauka</span></div>`;
    }
    if (whyus.items) {
      document.getElementById('why-list').innerHTML = whyus.items.map(item =>
        `<li><div class="why-check">✓</div><div><h4>${item.title}</h4><p>${item.desc}</p></div></li>`
      ).join('');
    }
  }

  // CONTACT
  if (contact) {
    document.getElementById('contact-eyebrow').textContent = contact.eyebrow || '';
    document.getElementById('contact-heading').innerHTML = contact.heading || '';
    document.getElementById('contact-intro').textContent = contact.intro || '';
    let details = '';
    if (contact.phone) details += `<div class="contact-item"><div class="contact-item-icon">📞</div><span>${contact.phone}</span></div>`;
    if (contact.email) details += `<div class="contact-item"><div class="contact-item-icon">✉️</div><span>${contact.email}</span></div>`;
    if (contact.address) details += `<div class="contact-item"><div class="contact-item-icon">📍</div><span>${contact.address}</span></div>`;
    document.getElementById('contact-details').innerHTML = details;
  }

  // FOOTER
  if (footer) {
    document.getElementById('footer-tagline').textContent = footer.tagline || '';
    document.getElementById('footer-copyright').textContent = footer.copyright || '';
  }

  // Init animations after content loaded
  initAnimations();
}

function initAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  document.querySelectorAll('.stat-item').forEach(el => observer.observe(el));
  document.querySelectorAll('.service-card').forEach((el, i) => {
    el.style.transitionDelay = `${i * 0.1}s`;
    observer.observe(el);
  });

  window.addEventListener('scroll', () => {
    const nav = document.getElementById('nav');
    nav.style.padding = window.scrollY > 80 ? '0.9rem 4rem' : '1.4rem 4rem';
  });
}

init();

// Netlify Identity redirect
if (window.netlifyIdentity) {
  window.netlifyIdentity.on("init", user => {
    if (!user) {
      window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
    }
  });
}
</script>
</body>
</html>
