backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: lt

collections:
  - name: "settings"
    label: "Svetainės turinys"
    files:

      - name: "hero"
        label: "🏠 Pagrindinis blokas (Hero)"
        file: "data/hero.json"
        fields:
          - { label: "Viršutinis tekstas (eyebrow)", name: "eyebrow", widget: "string" }
          - { label: "Pagrindinis antraštė (1 eilutė)", name: "heading1", widget: "string" }
          - { label: "Pagrindinis antraštė (2 eilutė, kursyvu)", name: "heading2", widget: "string" }
          - { label: "Pagrindinis antraštė (3 eilutė)", name: "heading3", widget: "string" }
          - { label: "Aprašymas (sub tekstas)", name: "sub", widget: "text" }
          - { label: "Pagrindinis mygtukas (tekstas)", name: "btn1Text", widget: "string" }
          - { label: "Antrinis mygtukas (tekstas)", name: "btn2Text", widget: "string" }
          - { label: "Pagrindinis nuotrauka", name: "image", widget: "image", required: false }

      - name: "stats"
        label: "📊 Statistikų juosta"
        file: "data/stats.json"
        fields:
          - label: "Statistikos"
            name: "items"
            widget: "list"
            fields:
              - { label: "Skaičius / simbolis", name: "num", widget: "string" }
              - { label: "Aprašymas", name: "label", widget: "string" }

      - name: "about"
        label: "ℹ️ Apie falcinį stogą"
        file: "data/about.json"
        fields:
          - { label: "Eyebrow tekstas", name: "eyebrow", widget: "string" }
          - { label: "Antraštė", name: "heading", widget: "string" }
          - { label: "1 pastraipa", name: "p1", widget: "text" }
          - { label: "2 pastraipa", name: "p2", widget: "text" }
          - label: "Privalumai"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "Ikona (emoji)", name: "icon", widget: "string" }
              - { label: "Pavadinimas", name: "title", widget: "string" }
              - { label: "Aprašymas", name: "desc", widget: "string" }

      - name: "gallery"
        label: "🖼️ Galerija"
        file: "data/gallery.json"
        fields:
          - { label: "Eyebrow tekstas", name: "eyebrow", widget: "string" }
          - { label: "Antraštė", name: "heading", widget: "string" }
          - label: "Nuotraukos"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Nuotrauka", name: "image", widget: "image" }
              - { label: "Aprašymas (alt tekstas)", name: "alt", widget: "string" }

      - name: "services"
        label: "🔨 Paslaugos"
        file: "data/services.json"
        fields:
          - { label: "Eyebrow tekstas", name: "eyebrow", widget: "string" }
          - { label: "Antraštė", name: "heading", widget: "string" }
          - { label: "Įvadinis tekstas", name: "intro", widget: "text" }
          - label: "Paslaugų sąrašas"
            name: "items"
            widget: "list"
            fields:
              - { label: "Pavadinimas", name: "title", widget: "string" }
              - { label: "Aprašymas", name: "desc", widget: "text" }

      - name: "whyus"
        label: "✅ Kodėl rinktis mus"
        file: "data/whyus.json"
        fields:
          - { label: "Eyebrow tekstas", name: "eyebrow", widget: "string" }
          - { label: "Antraštė", name: "heading", widget: "string" }
          - { label: "Įvadinis tekstas", name: "intro", widget: "text" }
          - { label: "Nuotrauka", name: "image", widget: "image", required: false }
          - label: "Privalumų sąrašas"
            name: "items"
            widget: "list"
            fields:
              - { label: "Pavadinimas", name: "title", widget: "string" }
              - { label: "Aprašymas", name: "desc", widget: "string" }

      - name: "contact"
        label: "📞 Kontaktai"
        file: "data/contact.json"
        fields:
          - { label: "Eyebrow tekstas", name: "eyebrow", widget: "string" }
          - { label: "Antraštė", name: "heading", widget: "string" }
          - { label: "Aprašymas", name: "intro", widget: "text" }
          - { label: "Telefono numeris", name: "phone", widget: "string" }
          - { label: "El. paštas", name: "email", widget: "string" }
          - { label: "Adresas", name: "address", widget: "string" }

      - name: "footer"
        label: "🔻 Poraštė (Footer)"
        file: "data/footer.json"
        fields:
          - { label: "Poraštės tekstas", name: "tagline", widget: "string" }
          - { label: "Autorių teisių tekstas", name: "copyright", widget: "string" }
